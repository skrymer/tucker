# Production overlay (ADR 0015 — production deployment topology). Layer it on the
# dev base; nothing here is for local dev:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# It adds the frontend container (serves the SPA and same-origins /api -> backend
# at runtime), points the single Cloudflare tunnel ingress at the frontend, and
# stops publishing the backend's port on the host. The Cloudflare dashboard
# ingress (<host> -> http://frontend:3000) is a one-time operator step, not
# expressible here (token tunnel) — see deploy/README.md.
#
# Off-host backup (litestream) is ungated here so a bare `up -d` brings it up in
# prod (issue #89); it needs the LITESTREAM_* secrets in .env and the backend's
# database in WAL mode (enabled at startup by SqliteWalMode).
#
# Requires Docker Compose >= v2.24.4 for the `!reset` tag.
services:
  frontend:
    build:
      context: ./frontend
      # Build stamp (issue #117): the same APP_VERSION/GIT_SHA update.sh exports
      # for the backend, baked into the SPA bundle so the frontend and backend
      # report the identical semver and a partial deploy is a visible SHA split.
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
    image: tucker-frontend:latest
    container_name: tucker-frontend
    restart: unless-stopped
    environment:
      # Same-origin /api proxy target: the backend over the internal compose
      # network. Read at runtime by server/routes/api/[...].ts.
      TUCKER_API_UPSTREAM: http://backend:8080
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M         # light nitro node server — keep Tucker bounded

  backend:
    # In prod nothing binds 8080 on the host: only the frontend and the tunnel
    # reach the backend over the internal network. `!reset` clears the dev base's
    # 127.0.0.1:8080 publish (a plain list would merge/append, not replace).
    ports: !reset []

  cloudflared:
    # The tunnel is always wanted in prod, so clear the base `tunnel` profile —
    # a bare `up -d` brings it up. Its single ingress fronts the frontend, which
    # serves the SPA and proxies /api, so Cloudflare Access gates exactly one app.
    profiles: !reset []
    depends_on:
      - frontend

  litestream:
    # Off-host backup is always wanted in prod, so clear the base `backup` profile
    # — a bare `up -d` brings it up (issue #89). It replicates the backend's WAL to
    # the LITESTREAM_* S3 target (Cloudflare R2); the keys live in the host .env.
    profiles: !reset []
