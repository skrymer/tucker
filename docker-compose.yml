name: tucker

services:
  backend:
    build:
      context: ./backend
      # Build stamp (issue #117). deploy/update.sh exports these from the root
      # VERSION file + git; local/CI builds that don't set them fall back to the
      # dev/unknown defaults so a bare `docker compose build` never fails.
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILT_AT: ${BUILT_AT:-unknown}
    image: tucker-backend:latest
    container_name: tucker-backend
    restart: unless-stopped
    environment:
      TUCKER_DB_PATH: /data/tucker.db
      TUCKER_PORT: "8080"
      # The engine works in the user's local day (LocalDate.now()), so the
      # container clock must match the browser's timezone — otherwise a review
      # or weight reading can land on the wrong calendar day near midnight.
      # Defaults to the host's zone; override by exporting TZ before compose.
      TZ: ${TZ:-Australia/Brisbane}
    volumes:
      - tucker-data:/data
    ports:
      - "127.0.0.1:8080:8080"   # localhost only; the tunnel reaches it over the compose network
    deploy:
      resources:
        limits:
          memory: 1G            # shared box (NAS, Jellyfin) — keep Tucker bounded

  # Off-host backup: continuous replication of the SQLite database to S3-compatible
  # storage (Cloudflare R2; B2 or any S3 works too). The backend puts the database
  # in WAL mode at startup (SqliteWalMode), which Litestream requires. Profile-gated
  # in this dev base; the prod overlay ungates it. Activate locally with:
  #   docker compose --profile backup up -d
  litestream:
    # Pinned, not :latest — a floating tag silently moved v0.3 → v0.5, which
    # changed the replication model: v0.5 *writes* to the database to coordinate
    # replication, where v0.3 opened it read-only. That write is why `user:` below
    # is required, and why the version is pinned so the model can't shift under us.
    image: litestream/litestream:0.5.12
    # Run as the same uid:gid that owns the DB file — the backend's `tucker` user
    # (uid 1001 / gid 999; see backend/Dockerfile). The DB is shared 0644, so as any
    # other user it is read-only and every sync fails with "attempt to write a
    # readonly database (8)".
    user: "1001:999"
    container_name: tucker-litestream
    restart: unless-stopped
    profiles: [backup]
    depends_on:
      - backend
    command: replicate
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY}
      LITESTREAM_BUCKET: ${LITESTREAM_BUCKET}
      LITESTREAM_ENDPOINT: ${LITESTREAM_ENDPOINT}
      LITESTREAM_REGION: ${LITESTREAM_REGION}
    volumes:
      - tucker-data:/data
      - ./deploy/litestream.yml:/etc/litestream.yml:ro

  # Cloudflare Tunnel: serves Tucker at your HTTPS hostname with no inbound ports.
  # Activate with:  docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tucker-cloudflared
    restart: unless-stopped
    profiles: [tunnel]
    depends_on:
      - backend
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}

volumes:
  tucker-data:
