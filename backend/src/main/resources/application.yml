spring:
  application:
    name: tucker
  datasource:
    url: jdbc:sqlite:${TUCKER_DB_PATH:tucker.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1            # SQLite is single-writer; one connection avoids lock contention
      connection-init-sql: PRAGMA foreign_keys = ON
  jooq:
    sql-dialect: sqlite

server:
  port: ${TUCKER_PORT:8080}

springdoc:
  swagger-ui:
    path: /docs
  writer-with-default-pretty-printer: true

# Build stamp (issue #117): baked into the image as env at build time
# (Dockerfile ARG -> ENV) and surfaced by GET /api/version. Defaults keep local
# `bootRun` and CI builds that set nothing reading as dev/unknown.
tucker:
  version: ${APP_VERSION:dev}
  git-sha: ${GIT_SHA:unknown}
  built-at: ${BUILT_AT:unknown}
